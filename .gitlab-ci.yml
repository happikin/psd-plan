stages:
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

tests:
  stage: test
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e .[dev]
  script:
    - pytest -q --junitxml=pytest-report.xml
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit: pytest-report.xml
